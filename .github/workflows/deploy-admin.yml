name: Deploy Admin Web

on:
  push:
    branches: [main]
    paths:
      - 'lib/admin/**'
      - 'lib/admin_main.dart'
      - 'lib/services/**'
      - 'lib/models/**'
      - 'lib/rendering/**'
      - 'lib/widgets/pattern_preview.dart'
      - 'pubspec.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build web --target lib/admin_main.dart --release

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/web/*"
          target: "~/admin-web/build/"
          strip_components: 2

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: docker restart admin-web
