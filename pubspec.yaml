name: bobobeads
description: "Convert images into bead patterns for perler bead art."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0-113.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  image: ^4.3.0
  pdf: ^3.11.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/figma_home/
  fonts:
    - family: Z Labs RoundPix 12px M CN
      fonts:
        - asset: assets/fonts/ZLabsRoundPix_12px_M_CN.ttf
    - family: Alimama FangYuanTi VF
      fonts:
        - asset: assets/fonts/AlimamaFangYuanTiVF-Thin-2.ttf
    - family: Taprom
      fonts:
        - asset: assets/fonts/Taprom-Regular.ttf
